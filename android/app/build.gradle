plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin 必须放在 Android 和 Kotlin Plugin 之后
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.finance.app"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId = "com.finance.app"
        // 用 adaptive icon，需要 API 26 (Android 8.0)+
        minSdk = 26
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // 调试签名，方便本机/朋友手机安装。上架商店需要换成正式签名
            signingConfig = signingConfigs.debug
            // 关闭 R8 minify 会让 apk 更大但避免 ML Kit 等可选模块的 missing class
            // 这里保留 minify=true，并通过 proguard-rules.pro 显式 keep / dontwarn
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // AGP 8.9 + compileSdk 36 要求 desugar 2.1.4+
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    // 注：原 ML Kit 中文 OCR 依赖已移除（OCR 改用 LLM 多模态），省 ~33MB 包体
}
