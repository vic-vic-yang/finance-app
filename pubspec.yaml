name: finance_app
description: 财记 · 个人财务管理
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  fl_chart: ^0.68.0
  provider: ^6.1.2
  # Aura Finance 设计系统：Outfit 字体（首次启动从 CDN 下载并 cache 到 app 文档目录）
  google_fonts: ^6.2.1

  # AI 智能记账：上传文件给后端 LLM 解析
  file_picker: ^8.0.0+1
  http_parser: ^4.0.2

  # 财经资讯：点新闻打开原文链接（外部浏览器）
  url_launcher: ^6.2.5

  # ── 国密加密（数据加密 + 端到端共享） ───────────────────
  # SM2/SM3/SM4 国密算法（Flutter 实现，Dart 3+）
  gm_crypto: ^1.0.0
  # JSON serialization helper for crypto bundles
  dart_sm_new: ^0.1.9
  # 安全存储：解密后的私钥 / DEK 缓存到 Keychain / Keystore
  flutter_secure_storage: ^9.2.2
  # 密码学原语：PBKDF2、随机数（KDF / 恢复码生成）
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
