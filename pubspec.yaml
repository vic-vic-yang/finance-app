name: finance_app
description: 司库 · 你的私人财务管家
publish_to: 'none'
version: 1.0.24+26

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  fl_chart: ^0.68.0
  provider: ^6.1.2
  # Aura Finance 设计系统：Outfit 字体（首次启动从 CDN 下载并 cache 到 app 文档目录）
  google_fonts: ^6.2.1

  # AI 智能记账：上传文件给后端 LLM 解析
  file_picker: ^8.0.0+1
  http_parser: ^4.0.2

  # 财经资讯：点新闻打开原文链接（外部浏览器）
  url_launcher: ^6.2.5

  # ── 国密加密（数据加密 + 端到端共享） ───────────────────
  # SM2/SM3/SM4 国密算法（Flutter 实现，Dart 3+）
  gm_crypto: ^1.0.0
  # JSON serialization helper for crypto bundles
  dart_sm_new: ^0.1.9
  # 安全存储：解密后的私钥 / DEK 缓存到 Keychain / Keystore
  flutter_secure_storage: ^9.2.2
  # 密码学原语：PBKDF2、随机数（KDF / 恢复码生成）
  pointycastle: ^3.9.1
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 生成 App 图标 / 启动页（用 assets/icon/app_icon.png）
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

# ── App 图标（dart run flutter_launcher_icons）──────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# ── 启动页（dart run flutter_native_splash:create）──────────
# 深主题绿做底 + logo 居中。Android 12+ 系统强制显示图标，无法去掉；
# 所以策略是"无缝衔接"：Flutter 内 _SplashScreen 用同样的绿底 + 同位置 logo（静态，无入场动画），
# 让原生闪屏直接过渡到设计页，不出现 logo 跳变/二次弹出。
flutter_native_splash:
  color: "#1B3022"
  image: "assets/icon/app_icon.png"
  android: true
  ios: false
  web: false
  android_12:
    color: "#1B3022"
    image: "assets/icon/app_icon.png"
    icon_background_color: "#1B3022"
